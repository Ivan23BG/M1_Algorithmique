name: Build LaTeX Documents

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'run.py'
      - '.github/workflows/build-latex.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build_latex:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-science \
            texlive-pictures \
            texlive-lang-french \
            latexmk \
            python3

      - name: Build LaTeX documents
        run: |
          python3 run.py

      - name: List generated PDFs
        run: |
          echo "Generated PDFs:"
          find pdfs -name "*.pdf" -type f | sort

      - name: Commit PDFs back to repo
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add pdfs

          if git diff --cached --quiet; then
            echo "No PDF changes."
            exit 0
          fi

          git commit -m "Update generated PDFs [skip ci]"
          git push

      - name: Set release date
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: echo "RELEASE_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Prepare renamed PDFs for release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p release_pdfs

          find pdfs -name "*.pdf" -type f | while read filepath; do
            relative="${filepath#pdfs/}"
            flat_name="${relative//\//_}"
            cp "$filepath" "release_pdfs/$flat_name"
          done

          echo "Renamed PDFs:"
          ls release_pdfs/

          cd release_pdfs
          zip -r ../all-pdfs.zip .

      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}-${{ env.RELEASE_DATE }}
          name: "Build #${{ github.run_number }} — ${{ env.RELEASE_DATE }}"
          body: |
            Automated PDF build from commit ${{ github.sha }}

            **Triggered by:** ${{ github.actor }}
            **Branch:** ${{ github.ref_name }}
            **Date:** ${{ env.RELEASE_DATE }}
          files: |
            all-pdfs.zip
            release_pdfs/*.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload PDFs for PRs
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: latex-pdfs-${{ github.sha }}
          path: pdfs/**/*.pdf

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: latex-logs-${{ github.sha }}
          path: logs/**/*.log